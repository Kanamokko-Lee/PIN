<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station PIN Codes</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* ==========================================
           📱 レスポンシブ対応：サイドバー基本設定
           ========================================== */
        .sidebar {
            width: 260px; /* PC・iPadでの標準幅 */
            background: #f9f9fb;
            border-right: 1px solid #e5e5ea;
            display: flex;
            flex-direction: column;
            height: 100%;
            flex-shrink: 0;
            transition: width 0.3s ease;
        }
        .sidebar-header {
            padding: 12px 15px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #8e8e93;
            border-bottom: 1px solid #e5e5ea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            white-space: nowrap;
        }
        .tab-list {
            overflow-y: auto;
            flex: 1;
        }
        .tab-item {
            padding: 14px 15px;
            cursor: pointer;
            border-bottom: 1px solid #f1f1f4;
            font-size: 0.95rem;
            color: #3a3a3c;
            display: flex;
            flex-direction: column;
            gap: 2px;
            transition: background 0.2s;
        }
        .tab-item:hover { background-color: #f1f1f4; }
        .tab-item.active {
            background-color: #e5e5ea;
            font-weight: bold;
            color: #1d1d1f;
        }
        .tab-meta {
            font-size: 0.7rem;
            color: #8e8e93;
        }

        /* iPhone（画面幅が狭い時）のスタイル上書き */
        @media screen and (max-width: 768px) {
            .sidebar {
                width: 65px; /* 3〜4文字分だけ残して極細に */
            }
            .sidebar-header span, .tab-meta {
                display: none; /* 不要なテキストを非表示 */
            }
            .sidebar-header {
                padding: 10px 5px;
                justify-content: center;
            }
            .sidebar-header button {
                font-size: 0.6rem;
                padding: 2px 4px;
            }
            .tab-item {
                padding: 15px 5px;
                align-items: center;
                text-align: center;
            }
            /* タブ名を最初の4文字（国旗＋コード等）で切り抜くための設定 */
            .tab-title-text {
                font-size: 0.85rem;
                display: block;
                width: 100%;
                overflow: hidden;
                white-space: nowrap;
            }
        }

        /* ==========================================
           メインエリア & エディタ
           ========================================== */
        .main-content {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        .top-bar {
            padding: 8px 15px;
            border-bottom: 1px solid #e5e5ea;
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            background: #e5e5ea;
            color: #48484a;
            font-weight: 500;
        }
        .status-badge.gps-active { background: #d1e7dd; color: #0f5132; }

        .editor-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            box-sizing: border-box;
        }
        
        /* 編集・エディタ要素（1枚の紙のように全行編集可能に） */
        .editable-body {
            outline: none;
            min-height: 80%;
            line-height: 1.6;
            white-space: pre-wrap;
            font-size: 1rem;
            color: #1d1d1f;
        }
        
        /* Bear風デコレーション */
        .m-blue   { background-color: #d1e7dd; color: #0f5132; padding: 1px 4px; border-radius: 4px; font-weight: bold; }
        .m-yellow { background-color: #fff3cd; color: #664d03; padding: 1px 4px; border-radius: 4px; font-weight: bold; }
        .m-pink   { background-color: #f8d7da; color: #842029; padding: 1px 4px; border-radius: 4px; font-weight: bold; }
        .m-gray   { background-color: #e2e3e5; color: #41464b; padding: 1px 4px; border-radius: 4px; }
        .f-large  { font-size: 1.25rem; }
        .f-bold   { font-weight: bold; }
        .map-img  { max-width: 100%; height: auto; margin-top: 15px; border-radius: 6px; }

        /* 同期・管理用セクション */
        .sync-section {
            background: #f5f5f7;
            padding: 15px;
            border-top: 1px solid #e5e5ea;
            font-size: 0.8rem;
        }
        .sync-textarea {
            width: 100%;
            height: 60px;
            font-family: monospace;
            font-size: 0.75rem;
            box-sizing: border-box;
            margin-top: 5px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <span>STATION</span>
            <button onclick="manualRetry()">GPS再捕</button>
        </div>
        <div id="tab-list" class="tab-list"></div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div id="gps-status" class="status-badge">GPS接続中...</div>
            <span style="color:#8e8e93; font-size:0.7rem;">タップして直接編集可能（自動保存）</span>
        </div>
        
        <div class="editor-container">
            <div id="editor-body" class="editable-body" contenteditable="true" oninput="saveContentChange()"></div>
        </div>

        <div class="sync-section">
            <details>
                <summary style="cursor:pointer; font-weight:bold; color:#0071e3;">⚙️ 外部データ同期 / バックアップ (JSON)</summary>
                <p style="margin:5px 0;">全ステーションの全データを下のテキストエリアにJSONとして出力しています。PCへの移行やBearとのデータ同期にご活用ください。</p>
                <button onclick="exportData()">最新データを読込出力</button>
                <button onclick="importData()" style="background:#0071e3; color:white; border:none; padding:3px 8px; border-radius:4px; cursor:pointer;">下のデータに書き換え適用</button>
                <textarea id="sync-io" class="sync-textarea" placeholder="ここにJSONデータを貼り付けてインポートも可能"></textarea>
            </details>
        </div>
    </div>

    <div id="toast" class="toast">保存しました</div>

    <script>
        // ==========================================================================
        // 🛰️ 位置情報ターゲット定義 (緯度・経度・判定半径)
        // データ本体（文章）とは分離し、位置ジャンプのトリガーとして管理します。
        // ==========================================================================
        const STATION_COORDINATES = {
            itm:       { lat: 34.789539, lng: 135.438519, rad: 4.0, short: "🇯🇵O3" },
            cts:       { lat: 42.775244, lng: 141.692291, rad: 5.0, short: "🇯🇵C3" },
            fuk:       { lat: 33.585806, lng: 130.450654, rad: 4.0, short: "🇯🇵F2" },
            kix:       { lat: 34.436521, lng: 135.244141, rad: 5.0, short: "🇯🇵B2" },
            hnd:       { lat: 35.549225, lng: 139.784432, rad: 5.0, short: "🇯🇵G3" },
            oka:       { lat: 26.206411, lng: 127.646533, rad: 4.0, short: "🇯🇵縄3" },
            tpe:       { lat: 25.079706, lng: 121.234217, rad: 10.0, short: "✈️海外" },
            ngo:       { lat: 34.858411, lng: 136.805391, rad: 4.0, short: "☀️T3" },
            aoj:       { lat: 40.734567, lng: 140.690856, rad: 3.0, short: "☀️A3" },
            can_memo:  { lat: 23.392436, lng: 113.298786, rad: 10.0, short: "CAN" },
            zushi:     { lat: 34.960631, lng: 139.578641, rad: 3.0, short: "🏠現地" }
        };

        // アプリ内で保持するデータ。ローカルストレージに無ければ末尾の初期データベースをロード
        let CURRENT_DATABASE = JSON.parse(localStorage.getItem('airport_pin_db_v2')) || INITIAL_DATA;
        let currentActiveId = CURRENT_DATABASE[0].id;
        let saveTimeout = null;

        // ==========================================================================
        // 🔄 描画ロジック
        // ==========================================================================
        
        function renderSidebar(activeId) {
            const listEl = document.getElementById("tab-list");
            listEl.innerHTML = "";
            
            CURRENT_DATABASE.forEach(data => {
                const item = document.createElement("div");
                item.className = `tab-item ${data.id === activeId ? 'active' : ''}`;
                item.onclick = () => selectTab(data.id);
                
                // 位置情報設定から略称(short)を取得、無ければ名前の先頭4文字を使用
                const coord = STATION_COORDINATES[data.id];
                const shortName = coord ? coord.short : data.name.substring(0, 4);
                
                item.innerHTML = `
                    <span class="tab-title-text" title="${data.name}">${data.name}</span>
                    <span class="tab-meta">半径 ${coord ? coord.rad : 3}km</span>
                `;
                
                // モバイル表示用に、ショートネーム属性を仕込む（CSSで切り替わる場合はそちら、今回はJSで文字を保護）
                if (window.innerWidth <= 768) {
                    item.querySelector('.tab-title-text').innerText = shortName;
                }
                
                listEl.appendChild(item);
            });
        }

        function renderEditor(id) {
            const record = CURRENT_DATABASE.find(r => r.id === id);
            if (!record) return;

            currentActiveId = id;
            const editorEl = document.getElementById("editor-body");
            
            // 完全に1つのテキストストリームとして、1行目のタイトルごとエディタに展開
            editorEl.innerHTML = record.content;
        }

        function selectTab(id) {
            currentActiveId = id;
            renderSidebar(id);
            renderEditor(id);
        }

        // ==========================================================================
        // 💾 リアルタイム自動保存 ＆ 同期コア
        // ==========================================================================
        function saveContentChange() {
            const record = CURRENT_DATABASE.find(r => r.id === currentActiveId);
            if (record) {
                const fullHtml = document.getElementById("editor-body").innerHTML;
                record.content = fullHtml;
                
                // 1行目のテキスト（プレーンテキスト）を抽出して、リアルタイムに左側のタブ名に反映
                const tempDiv = document.createElement("div");
                tempDiv.innerHTML = fullHtml;
                const firstLine = tempDiv.innerText.split("\n")[0] || record.name;
                record.name = firstLine;

                renderSidebar(currentActiveId);
                
                // 遅延自動セーブ
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => {
                    localStorage.setItem('airport_pin_db_v2', JSON.stringify(CURRENT_DATABASE));
                    showToast();
                }, 1000);
            }
        }

        function showToast() {
            const toast = document.getElementById("toast");
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 1000);
        }

        // ==========================================================================
        // ⚙️ Bear同期用 インポート/エクスポート
        // ==========================================================================
        function exportData() {
            document.getElementById("sync-io").value = JSON.stringify(CURRENT_DATABASE, null, 2);
        }

        function importData() {
            const rawJson = document.getElementById("sync-io").value;
            if(!rawJson) return alert("データが空です");
            try {
                const parsed = JSON.parse(rawJson);
                if(Array.isArray(parsed)) {
                    CURRENT_DATABASE = parsed;
                    localStorage.setItem('airport_pin_db_v2', JSON.stringify(CURRENT_DATABASE));
                    selectTab(CURRENT_DATABASE[0].id);
                    alert("同期・書き換えが成功しました！");
                }
            } catch(e) {
                alert("JSONフォーマットが正しくありません。");
            }
        }

        // ==========================================================================
        // 🛰️ GPS自動トラッキング
        // ==========================================================================
        function getDistanceKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function startGpsTracking() {
            const statusEl = document.getElementById("gps-status");
            if (!("geolocation" in navigator)) {
                statusEl.innerText = "GPS非対応";
                return;
            }

            navigator.geolocation.watchPosition(
                (position) => {
                    const uLat = position.coords.latitude;
                    const uLng = position.coords.longitude;
                    let matchedId = null;

                    for (const [id, target] of Object.entries(STATION_COORDINATES)) {
                        const dist = getDistanceKm(uLat, uLng, target.lat, target.lng);
                        if (dist <= target.rad) {
                            matchedId = id;
                            break;
                        }
                    }

                    if (matchedId) {
                        const targetRecord = CURRENT_DATABASE.find(r => r.id === matchedId);
                        statusEl.innerText = `📍 到着自動連動: ${targetRecord ? targetRecord.name.substring(0,8) : matchedId}`;
                        statusEl.className = "status-badge gps-active";
                        
                        if (currentActiveId !== matchedId) {
                            selectTab(matchedId);
                        }
                    } else {
                        statusEl.innerText = "📡 エリア外（手動切替モード）";
                        statusEl.className = "status-badge";
                    }
                },
                (err) => {
                    statusEl.innerText = "🔒 GPS信号オフ（手動選択）";
                    statusEl.className = "status-badge";
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
            );
        }

        function manualRetry() { startGpsTracking(); }
        window.addEventListener('resize', () => renderSidebar(currentActiveId));

        // 初期キック
        selectTab(currentActiveId);
        startGpsTracking();
    </script>

        if(!localStorage.getItem('airport_pin_db_v2') && localStorage.getItem('airport_pin_db')){

</body>
</html>
