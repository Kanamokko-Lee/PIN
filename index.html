<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station PIN Codes</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* ① 左側：タブエリア */
        .sidebar {
            width: 300px;
            background: #f9f9fb;
            border-right: 1px solid #e5e5ea;
            display: flex;
            flex-direction: column;
            height: 100%;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 15px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #8e8e93;
            border-bottom: 1px solid #e5e5ea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
        }
        .tab-list {
            overflow-y: auto;
            flex: 1;
        }
        
        /* 並び替え(ドラッグ＆ドロップ)用のスタイル */
        .tab-item {
            padding: 14px 18px;
            cursor: grab;
            border-bottom: 1px solid #f1f1f4;
            font-size: 0.95rem;
            color: #3a3a3c;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: #f9f9fb;
            user-select: none;
            transition: background 0.2s, opacity 0.2s;
        }
        .tab-item:active { cursor: grabbing; }
        .tab-item.dragging { opacity: 0.4; background: #e5e5ea; }
        .tab-item:hover { background-color: #f1f1f4; }
        .tab-item.active {
            background-color: #e5e5ea;
            font-weight: bold;
            color: #1d1d1f;
        }
        .tab-meta {
            font-size: 0.75rem;
            color: #8e8e93;
            display: flex;
            justify-content: space-between;
            pointer-events: none; /* 子要素の干渉を防ぐ */
        }
        .tab-title-text { pointer-events: none; }

        /* ② 右側：本文エリア */
        .main-content {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        .top-bar {
            padding: 10px 20px;
            border-bottom: 1px solid #e5e5ea;
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        /* 編集ツールバーのスタイル */
        .toolbar {
            display: flex;
            gap: 4px;
            align-items: center;
            background: #f5f5f7;
            padding: 4px;
            border-radius: 8px;
            border: 1px solid #e5e5ea;
        }
        .toolbar button, .toolbar select {
            border: none;
            background: transparent;
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            color: #333;
            font-weight: 500;
        }
        .toolbar button:hover { background: #e5e5ea; }
        .toolbar select {
            background: white;
            border: 1px solid #d1d1d6;
            padding: 3px 4px;
        }

        .status-badge {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 12px;
            background: #e5e5ea;
            color: #48484a;
            font-weight: 500;
        }
        .status-badge.gps-active { background: #d1e7dd; color: #0f5132; }

        .editor-container {
            flex: 1;
            padding: 30px 40px;
            overflow-y: auto;
            box-sizing: border-box;
        }
        .editable-title {
            font-size: 1.6rem;
            font-weight: bold;
            color: #1d1d1f;
            border-bottom: 2px solid #0071e3;
            padding-bottom: 8px;
            margin-bottom: 20px;
            outline: none;
        }
        .edit-block {
            outline: none;
            min-height: 200px;
            line-height: 1.6;
            white-space: pre-wrap;
            font-size: 1.05rem;
        }
        
        /* Bear風マーカー（クラス指定ではなくインラインでも動くよう装飾） */
        .map-img {
            max-width: 100%;
            height: auto;
            margin-top: 15px;
            border: 1px solid #e5e5ea;
            border-radius: 8px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
            z-index: 1000;
        }

        /* スマホ対応 */
        @media screen and (max-width: 768px) {
            .sidebar { width: 75px; }
            .sidebar-header span, .tab-meta { display: none; }
            .sidebar-header { padding: 10px 5px; justify-content: center; }
            .sidebar-header button { font-size: 0.65rem; padding: 2px 4px; }
            .tab-item { padding: 15px 5px; align-items: center; text-align: center; }
            .tab-title-text { font-size: 0.9rem; display: block; width: 100%; overflow: hidden; white-space: nowrap; }
            .editor-container { padding: 20px 15px; }
            .toolbar { display: flex; flex-wrap: wrap; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <span>STATION LIST</span>
            <button onclick="manualRetry()" style="font-size:0.75rem; cursor:pointer; padding:2px 6px;">GPS再捕</button>
        </div>
        <div id="tab-list" class="tab-list"></div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div id="gps-status" class="status-badge">GPS初期化中...</div>
            
            <div class="toolbar">
                <select onchange="execCmd('fontSize', this.value); this.value='3';">
                    <option value="3" selected>サイズ</option>
                    <option value="5">大</option>
                    <option value="4">中</option>
                    <option value="3">標準</option>
                    <option value="2">小</option>
                </select>
                <button onclick="execCmd('bold')" style="font-weight:bold;">B</button>
                <select onchange="execCmd('foreColor', this.value); this.value='';">
                    <option value="" selected>文字色</option>
                    <option value="#000000">⬛ 黒</option>
                    <option value="#ff3b30">🟥 赤</option>
                    <option value="#0071e3">🟦 青</option>
                    <option value="#34c759">🟩 緑</option>
                </select>
                <select onchange="execCmd('hiliteColor', this.value); this.value='';">
                    <option value="" selected>マーカー</option>
                    <option value="#fff3cd">🟨 黄</option>
                    <option value="#d1e7dd">🟩 緑</option>
                    <option value="#f8d7da">🟥 赤</option>
                    <option value="#e2e3e5">⬛ 灰</option>
                    <option value="transparent">❌ 消去</option>
                </select>
            </div>
            
            <span style="font-size:0.75rem; color:#8e8e93;">自動保存</span>
        </div>
        
        <div class="editor-container">
            <div id="building-name" class="editable-title" contenteditable="true" oninput="saveTitleChange()">---</div>
            <div id="editor-body" class="edit-block" contenteditable="true" oninput="saveBodyChange()"></div>
        </div>
    </div>

    <div id="toast" class="toast">変更を自動保存しました</div>

    <script>
        // 初期データ（LocalStorageが空の時のみ使用）
        const DEFAULT_AREAS = [
            { id: "itm", name: "🇯🇵O3 KKW:2階", short: "ITM", lat: 34.789539, lng: 135.438519, radiusKm: 4.0, body: `①KKWビル入口自動ドア：<span style="background-color: rgb(209, 231, 221); color: rgb(15, 81, 50); font-weight: bold; font-size: large;">2485E</span><br>↑レンタカー区画、関西airport(株)出入口も<br><br>②KKW <span style="background-color: rgb(209, 231, 221); color: rgb(15, 81, 50); font-weight: bold;">3628</span><br> 	↑ID使用可(ターミナル側ガラス扉)<br><br><span style="background-color: rgb(255, 243, 205); color: rgb(102, 77, 3); font-weight: bold;">ーー Dispatch Briefing ーー</span><br><br>④北従業員 <span style="background-color: rgb(248, 215, 218); color: rgb(132, 32, 41);">検査場</span> 通路：<span style="background-color: rgb(248, 215, 218); color: rgb(132, 32, 41); font-weight: bold; font-size: large;">7244</span><br> 	(17番横)　(~6/1 20:30頃)<br><br>⑤ <span style="background-color: rgb(248, 215, 218); color: rgb(132, 32, 41);">G, PBB : 8471</span> (5/1~)<br><br>2026/5/1　リバイス` },
            { id: "cts", name: "🇯🇵C3 KKW:BD◯◯(前月)", short: "CTS", lat: 42.775244, lng: 141.692291, radiusKm: 5.0, body: `ID使えるらしい◆<br><br>エレベータ、保安検査場：<span style="background-color: rgb(226, 227, 229); color: rgb(65, 70, 75); font-weight: bold;">3017#</span><br>2511、？<br><br><span style="background-color: rgb(248, 215, 218); color: rgb(132, 32, 41);">G : 2514</span> , <span style="background-color: rgb(248, 215, 218); color: rgb(132, 32, 41);">PBB: 2513</span><br><br>#14下クルーバス乗り場：<span style="background-color: rgb(226, 227, 229); color: rgb(65, 70, 75); font-weight: bold;">25(1)2</span><br>ホテルバス @警察署先<br><br>2026/5/1リバイス.` },
            { id: "fuk", name: "🇯🇵F2 ロビー→1250E 3階", short: "FUK", lat: 33.585806, lng: 130.450654, radiusKm: 4.0, body: `<span style="background-color: rgb(248, 215, 218); color: rgb(132, 32, 41); font-weight: bold;">G: 3042E</span> 左回転<br><br><span style="background-color: rgb(248, 215, 218); color: rgb(132, 32, 41); font-weight: bold;">PBB先端：5209E</span> 左回転<br><br>OPEN/ ARR時：<span style="background-color: rgb(226, 227, 229); color: rgb(65, 70, 75); font-weight: bold;">3042 E→3042 E</span><br>福岡昭和タクシー：0120-408-860<br>ターミナル出て左に変わった<br><br>ロビーから：「バックヤード」<span style="background-color: rgb(226, 227, 229); color: rgb(65, 70, 75); font-weight: bold;">3994 E</span><br><br>2026/5/1リバイス` },
            { id: "hnd", name: "🇯🇵G3 ビル: 44119# 3階", short: "HND", lat: 35.549225, lng: 139.784432, radiusKm: 5.0, body: `Dispatch後<br> 	:ビル<span style="background-color: rgb(209, 231, 221); color: rgb(15, 81, 50);">4階</span> ＋ ターミナル<span style="background-color: rgb(209, 231, 221); color: rgb(15, 81, 50);">3階</span><br><br>DOM <span style="background-color: rgb(248, 215, 218); color: rgb(132, 32, 41); font-weight: bold;">G : 31383#</span> ,<br><br>INT <span style="background-color: rgb(209, 231, 221); color: rgb(15, 81, 50); font-weight: bold;">G : 81611#</span> ,<br> 	PBB : 35#9<br><br>2026/5/1リバイス<br><br><br><img src="https://i.imgur.com/2Pof6i0.png" class="map-img" alt="HND-MAP">` }
        ];

        let AREAS = JSON.parse(localStorage.getItem('airport_pin_db')) || DEFAULT_AREAS;
        let currentActiveId = AREAS[0].id;
        let saveTimeout = null;

        // 🛠️ 文字装飾コマンド実行
        function execCmd(command, value = null) {
            document.execCommand(command, false, value);
            saveBodyChange();
        }

        // 🔄 タブの描画 ＆ ドラッグ＆ドロップイベント付与
        function renderSidebar(activeId) {
            const listEl = document.getElementById("tab-list");
            listEl.innerHTML = "";
            
            AREAS.forEach((area, index) => {
                const item = document.createElement("div");
                item.className = `tab-item ${area.id === activeId ? 'active' : ''}`;
                item.setAttribute("draggable", "true");
                item.setAttribute("data-index", index);
                item.onclick = (e) => {
                    if (item.classList.contains('dragging')) return;
                    selectTab(area.id);
                };
                
                // ドラッグイベントの登録
                item.addEventListener('dragstart', handleDragStart);
                item.addEventListener('dragover', handleDragOver);
                item.addEventListener('drop', handleDrop);
                item.addEventListener('dragend', handleDragEnd);
                
                // タッチデバイス（iPad/iPhone）用の簡易並び替えサポート
                item.addEventListener('touchstart', handleTouchStart, {passive: true});
                item.addEventListener('touchmove', handleTouchMove, {passive: false});
                item.addEventListener('touchend', handleTouchEnd);

                const isMobile = window.innerWidth <= 768;
                const titleText = isMobile ? (area.short || area.name.substring(0, 3)) : area.name;
                
                item.innerHTML = `
                    <div style="font-weight:600;"><span class="tab-title-text">${titleText}</span></div>
                    <div class="tab-meta"><span>${area.radiusKm}km 監視</span></div>
                `;
                listEl.appendChild(item);
            });
        }

        // 【ドラッグ＆ドロップ制御ロジック】
        let dragStartIndex = null;

        function handleDragStart(e) {
            dragStartIndex = parseInt(this.getAttribute('data-index'));
            this.classList.add('dragging');
        }
        function handleDragOver(e) {
            if (e.preventDefault) e.preventDefault();
            return false;
        }
        function handleDrop(e) {
            e.stopPropagation();
            const dragEndIndex = parseInt(this.getAttribute('data-index'));
            if (dragStartIndex !== dragEndIndex) {
                moveAreaItem(dragStartIndex, dragEndIndex);
            }
        }
        function handleDragEnd() {
            this.classList.remove('dragging');
        }

        // タッチ操作（iPad等）での並び替え簡易実装
        let touchStartEl = null;
        function handleTouchStart(e) {
            touchStartEl = e.currentTarget;
            dragStartIndex = parseInt(touchStartEl.getAttribute('data-index'));
        }
        function handleTouchMove(e) {
            // タッチ位置にある要素を取得して、視覚的に入れ替える簡易シミュレート
            const touch = e.touches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            const item = target ? target.closest('.tab-item') : null;
            if (item && item !== touchStartEl) {
                const overIndex = parseInt(item.getAttribute('data-index'));
                moveAreaItem(dragStartIndex, overIndex);
                dragStartIndex = overIndex;
                touchStartEl = item;
            }
        }
        function handleTouchEnd() { touchStartEl = null; }

        function moveAreaItem(from, to) {
            const targetItem = AREAS.splice(from, 1)[0];
            AREAS.splice(to, 0, targetItem);
            renderSidebar(currentActiveId);
            triggerStorage();
        }

        // 🔄 エディタ表示
        function renderEditor(areaId) {
            const areaData = AREAS.find(a => a.id === areaId);
            if (!areaData) return;
            currentActiveId = areaId;
            document.getElementById("building-name").innerText = areaData.name;
            document.getElementById("editor-body").innerHTML = areaData.body;
        }

        function selectTab(areaId) {
            currentActiveId = areaId;
            renderSidebar(areaId);
            renderEditor(areaId);
        }

        // 💾 ストレージ自動保存
        function saveTitleChange() {
            const areaData = AREAS.find(a => a.id === currentActiveId);
            if (areaData) {
                areaData.name = document.getElementById("building-name").innerText;
                renderSidebar(currentActiveId);
                triggerStorage();
            }
        }
        function saveBodyChange() {
            const areaData = AREAS.find(a => a.id === currentActiveId);
            if (areaData) {
                areaData.body = document.getElementById("editor-body").innerHTML;
                triggerStorage();
            }
        }
        function triggerStorage() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                localStorage.setItem('airport_pin_db', JSON.stringify(AREAS));
                showToast();
            }, 800);
        }
        function showToast() {
            const toast = document.getElementById("toast");
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 1200);
        }

        // 🛰️ GPS追従
        function getDistanceKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }
        function startGpsTracking() {
            const statusEl = document.getElementById("gps-status");
            if (!("geolocation" in navigator)) { statusEl.innerText = "GPS非対応"; return; }
            navigator.geolocation.watchPosition(
                (position) => {
                    const uLat = position.coords.latitude; const uLng = position.coords.longitude;
                    let matchedArea = null;
                    for (const area of AREAS) {
                        if (getDistanceKm(uLat, uLng, area.lat, area.lng) <= area.radiusKm) { matchedArea = area; break; }
                    }
                    if (matchedArea) {
                        statusEl.innerText = `📍 連動中: ${matchedArea.name.substring(0,6)}`;
                        statusEl.className = "status-badge gps-active";
                        if (currentActiveId !== matchedArea.id) selectTab(matchedArea.id);
                    } else {
                        statusEl.innerText = "📡 飛行中 / エリア外"; statusEl.className = "status-badge";
                    }
                },
                (err) => { statusEl.innerText = "🔒 GPS手動"; statusEl.className = "status-badge"; },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
            );
        }
        function manualRetry() { startGpsTracking(); }
        window.addEventListener('resize', () => renderSidebar(currentActiveId));
        selectTab(currentActiveId);
        startGpsTracking();
    </script>
</body>
</html>
