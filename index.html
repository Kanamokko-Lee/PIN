<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station PIN Codes</title>
    <style>
        /* 画面全体の基本リセット（2カラム固定・スクロール一元管理） */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* ① 左側：タブエリア（これ以上右に増殖しないよう幅を完全固定） */
        .sidebar {
            width: 300px;
            background: #f9f9fb;
            border-right: 1px solid #e5e5ea;
            display: flex;
            flex-direction: column;
            height: 100%;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 15px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #8e8e93;
            border-bottom: 1px solid #e5e5ea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
        }
        .tab-list {
            overflow-y: auto;
            flex: 1;
        }
        .tab-item {
            padding: 14px 18px;
            cursor: pointer;
            border-bottom: 1px solid #f1f1f4;
            font-size: 0.95rem;
            color: #3a3a3c;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .tab-item:hover { background-color: #f1f1f4; }
        .tab-item.active {
            background-color: #e5e5ea;
            font-weight: bold;
            color: #1d1d1f;
        }
        .tab-meta {
            font-size: 0.75rem;
            color: #8e8e93;
            display: flex;
            justify-content: space-between;
        }

        /* ② 右側：本文エリア（残りの画面幅をすべて使い、絶対に横に割れない構成） */
        .main-content {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        .top-bar {
            padding: 10px 20px;
            border-bottom: 1px solid #e5e5ea;
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-badge {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 12px;
            background: #e5e5ea;
            color: #48484a;
            font-weight: 500;
        }
        .status-badge.gps-active { background: #d1e7dd; color: #0f5132; }

        /* エディタ本文の余白 */
        .editor-container {
            flex: 1;
            padding: 30px 40px;
            overflow-y: auto;
            box-sizing: border-box;
        }
        .editable-title {
            font-size: 1.6rem;
            font-weight: bold;
            color: #1d1d1f;
            border-bottom: 2px solid #0071e3;
            padding-bottom: 8px;
            margin-bottom: 20px;
            outline: none;
        }
        .edit-block {
            outline: none;
            min-height: 1.2em;
            margin-bottom: 8px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        
        /* 文字装飾・スタイル */
        .f-normal { font-size: 1.05rem; }
        .f-large  { font-size: 1.3rem; }
        .f-bold   { font-weight: bold; }
        
        /* Bear風マーカーカラー */
        .m-blue   { background-color: #d1e7dd; color: #0f5132; padding: 2px 6px; border-radius: 4px; }
        .m-yellow { background-color: #fff3cd; color: #664d03; padding: 2px 6px; border-radius: 4px; }
        .m-pink   { background-color: #f8d7da; color: #842029; padding: 2px 6px; border-radius: 4px; }
        .m-gray   { background-color: #e2e3e5; color: #41464b; padding: 2px 6px; border-radius: 4px; }
        
        .map-img {
            max-width: 100%;
            height: auto;
            margin-top: 15px;
            border: 1px solid #e5e5ea;
            border-radius: 8px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
            z-index: 1000;
        }

        /* 📱 スマホ（iPhoneなど）表示時のレスポンシブ：左タブ幅をギュッと縮める */
        @media screen and (max-width: 768px) {
            .sidebar {
                width: 75px; /* 左側をコンパクトに固定 */
            }
            .sidebar-header span, .tab-meta {
                display: none; /* 余計なテキストを非表示 */
            }
            .sidebar-header {
                padding: 10px 5px;
                justify-content: center;
            }
            .sidebar-header button {
                font-size: 0.65rem;
                padding: 2px 4px;
            }
            .tab-item {
                padding: 15px 5px;
                align-items: center;
                text-align: center;
            }
            .tab-title-text {
                font-size: 0.9rem;
                display: block;
                width: 100%;
                overflow: hidden;
                white-space: nowrap;
            }
            .editor-container {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <span>STATION LIST</span>
            <button onclick="manualRetry()" style="font-size:0.75rem; cursor:pointer; padding:2px 6px;">GPS再捕</button>
        </div>
        <div id="tab-list" class="tab-list"></div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div id="gps-status" class="status-badge">GPS初期化中...</div>
            <span style="font-size:0.75rem; color:#8e8e93;">直接編集可能（自動保存）</span>
        </div>
        
        <div class="editor-container">
            <div id="building-name" class="editable-title" contenteditable="true" oninput="saveTitleChange()">---</div>
            <div id="editor-body" class="edit-block f-normal" contenteditable="true" oninput="saveBodyChange()"></div>
        </div>
    </div>

    <div id="toast" class="toast">変更を自動保存しました</div>

    <script>
        // ==========================================================================
        // 【全空港初期データベース】
        // ==========================================================================
        const DEFAULT_AREAS = [
            { id: "itm", name: "🇯🇵O3 KKW:2階", short: "ITM", lat: 34.789539, lng: 135.438519, radiusKm: 4.0, body: `①KKWビル入口自動ドア：<span class="m-blue f-large f-bold">2485E</span>\n↑レンタカー区画、関西airport(株)出入口も\n\n②KKW <span class="m-blue f-bold">3628</span>\n\t↑ID使用可(ターミナル側ガラス扉)\n\n<span class="m-yellow f-bold">ーー Dispatch Briefing ーー</span>\n\n④北従業員 <span class="m-pink">検査場</span> 通路：<span class="m-pink f-large f-bold">7244</span>\n\t(17番横)　(~6/1 20:30頃)\n\n⑤ <span class="m-pink">G, PBB : 8471</span> (5/1~)\n\n2026/5/1　リバイス` },
            { id: "cts", name: "🇯🇵C3 KKW:BD◯◯(前月)", short: "CTS", lat: 42.775244, lng: 141.692291, radiusKm: 5.0, body: `ID使えるらしい◆\n\nエレベータ、保安検査場：<span class="m-gray f-bold">3017#</span>\n2511、？\n\n<span class="m-pink">G : 2514</span> , <span class="m-pink">PBB: 2513</span>\n\n#14下クルーバス乗り場：<span class="m-gray f-bold">25(1)2</span>\nホテルバス @警察署先\n\n2026/5/1リバイス.` },
            { id: "fuk", name: "🇯🇵F2 ロビー→1250E 3階", short: "FUK", lat: 33.585806, lng: 130.450654, radiusKm: 4.0, body: `<span class="m-pink f-bold">G: 3042E</span> 左回転\n\n<span class="m-pink f-bold">PBB先端：5209E</span> 左回転\n\nOPEN/ ARR時：<span class="m-gray f-bold">3042 E→3042 E</span>\n福岡昭和タクシー：0120-408-860\nターミナル出て左に変わった\n\nロビーから：「バックヤード」<span class="m-gray f-bold">3994 E</span>\n\n2026/5/1リバイス` },
            { id: "kix", name: "🇯🇵B2 エア棟: 1125E 5階", short: "KIX", lat: 34.436521, lng: 135.244141, radiusKm: 5.0, body: `エア棟<span class="m-yellow">5階</span>＝タ<span class="m-yellow">3階</span> <span class="m-yellow">4階</span>へ\nタ<span class="m-yellow">4階</span>→<span class="m-yellow">北側(遠い方)保安検査</span>→3階出国\n\n<span class="m-blue f-bold">INT</span> 検査後：<span class="m-blue f-bold">5031▽</span> (23-7時)\n\n<span class="m-blue f-bold">G : 07GG#</span> ,\n\nPBB：0933# 螺旋：0940\n\n<span class="m-pink f-bold">DOM</span> 2F検査後：<span class="m-pink f-bold">5071▽</span>\n\n<span class="m-pink f-bold">G : 09GGE</span> ,\n\nPBB：0933# 螺旋：0940\n\n2026/5/1　変更無し` },
            { id: "hnd", name: "🇯🇵G3 ビル: 44119# 3階", short: "HND", lat: 35.549225, lng: 139.784432, radiusKm: 5.0, body: `Dispatch後\n\t:ビル<span class="m-blue">4階</span> ＋ ターミナル<span class="m-blue">3階</span>\n\nDOM <span class="m-pink f-bold">G : 31383#</span> ,\n\nINT <span class="m-blue f-bold">G : 81611#</span> ,\n\tPBB : 35#9\n\n2026/5/1リバイス\n\n\n<img src="https://i.imgur.com/2Pof6i0.png" class="map-img" alt="HND-MAP">` },
            { id: "oka", name: "🇯🇵縄3 ビル : *5071#", short: "OKA", lat: 26.206411, lng: 127.646533, radiusKm: 4.0, body: `<span class="m-blue f-bold">KKW 4階</span> <span class="m-blue f-bold">6717E</span>\n\n<span class="m-pink f-bold">G : *6374#</span> (-5/31)\n\n<span class="m-pink f-bold">PBB : ■2018▼</span>(-5/31)\n\n2026/5/1リバイス` },
            { id: "tpe", name: "✈️海外空港✈️", short: "TPE", lat: 25.079706, lng: 121.234217, radiusKm: 10.0, body: `🦷TPE3 1041E : <span class="m-blue f-bold">#D7</span> 下\n\nD1ゲート反対側 業務エレベーター <span class="m-pink f-bold">5576</span>\n\tPBB：整備士、KI、委託作業員に依頼\n\n🦷TSA3 KKW：#6,5番下\n\tPBB：3419#\n\n🦷PVG3\n\t外部点検：0583#\n\n🦷CAN3\n\tPBB：203510レ` },
            { id: "ngo", name: "☀️T3 F129 (-8/31)", short: "NGO", lat: 34.858411, lng: 136.805391, radiusKm: 4.0, body: `DOM <span class="m-pink f-bold">G : 7266</span>, (-10/31)\n\tPBB : <span class="m-pink">C0225</span> (~10/31)\n\nINT <span class="m-blue f-bold">G : 0397</span> \t(-8/1)\n\tPBB : <span class="m-blue">3804</span> (-4/30) ***\n\n出勤動線A：5480 (-11/1,2頃頃)\n\t保安検査追記：9909\n\n2026/5/1リバイス\n\n北側 F130` },
            { id: "aoj", name: "☀️A3", short: "AOJ", lat: 40.734567, lng: 140.690856, radiusKm: 3.0, body: `BAG : P29+M9カウンターに変更\n\n<span class="m-pink f-bold">G : 0874</span>, PBB:<span class="m-pink f-bold">0133</span>\n\n2026/08/20` },
            { id: "can_memo", name: "CAN", short: "CAN", lat: 23.392436, lng: 113.298786, radiusKm: 10.0, body: `到着：\n\n\n出発：\n@ホテル\nDispatch Brief：ホテル2階 (W213)\nPBBの暗証番号を聞く\n終了後ホテル1階ロビー → バスで空港3階 46ゲートから入れる\n\n@空港\n手荷物：Mカウンター\n手荷物検査：STAFF LANE →「乗務員搭乗LIST」、パスポート、ID\n税関：「税関申告書」を提出\n出国：CREW LANE ＋「乗務員搭乗LIST」,「GD」提出\n\n2025/03/19` },
            { id: "zushi", name: "🏠現地テスト用（逗子周辺）", short: "🏠現地", lat: 34.960631, lng: 139.578641, radiusKm: 3.0, body: `【これは自宅・滞在先テスト用のダミータブです】\n\n伊丹空港と全く同じ連動テストがここで行えます。\n\n①KKWビル入口自動ドア：<span class="m-blue f-large f-bold">2485E</span>\n②北従業員 検査場 通路：<span class="m-pink f-large f-bold">7244</span>\n\n文字を自由に打ち換えてテストしてください。` }
        ];

        let AREAS = JSON.parse(localStorage.getItem('airport_pin_db')) || DEFAULT_AREAS;
        let currentActiveId = AREAS[0].id;
        let saveTimeout = null;

        // ==========================================================================
        // 🔄 描画ファンクション
        // ==========================================================================
        function renderSidebar(activeId) {
            const listEl = document.getElementById("tab-list");
            listEl.innerHTML = "";
            
            AREAS.forEach(area => {
                const item = document.createElement("div");
                item.className = `tab-item ${area.id === activeId ? 'active' : ''}`;
                item.onclick = () => selectTab(area.id);
                
                // スマホ幅(768px以下)なら short（3文字など）を表示、iPadなら通常名を表示
                const isMobile = window.innerWidth <= 768;
                const titleText = isMobile ? (area.short || area.name.substring(0, 3)) : area.name;
                
                item.innerHTML = `
                    <div style="font-weight:600; display:flex; justify-content:space-between; align-items:center;">
                        <span class="tab-title-text">${titleText}</span>
                    </div>
                    <div class="tab-meta">
                        <span>半径 ${area.radiusKm}km</span>
                    </div>
                `;
                listEl.appendChild(item);
            });
        }

        function renderEditor(areaId) {
            const areaData = AREAS.find(a => a.id === areaId);
            if (!areaData) return;

            currentActiveId = areaId;
            document.getElementById("building-name").innerText = areaData.name;
            document.getElementById("editor-body").innerHTML = areaData.body;
        }

        function selectTab(areaId) {
            currentActiveId = areaId;
            renderSidebar(areaId);
            renderEditor(areaId);
        }

        // ==========================================================================
        // 💾 自動保存
        // ==========================================================================
        function saveTitleChange() {
            const areaData = AREAS.find(a => a.id === currentActiveId);
            if (areaData) {
                areaData.name = document.getElementById("building-name").innerText;
                renderSidebar(currentActiveId);
                triggerStorage();
            }
        }

        function saveBodyChange() {
            const areaData = AREAS.find(a => a.id === currentActiveId);
            if (areaData) {
                areaData.body = document.getElementById("editor-body").innerHTML;
                triggerStorage();
            }
        }

        function triggerStorage() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                localStorage.setItem('airport_pin_db', JSON.stringify(AREAS));
                showToast();
            }, 800);
        }

        function showToast() {
            const toast = document.getElementById("toast");
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 1200);
        }

        // ==========================================================================
        // 🛰️ GPS連動
        // ==========================================================================
        function getDistanceKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function startGpsTracking() {
            const statusEl = document.getElementById("gps-status");
            if (!("geolocation" in navigator)) {
                statusEl.innerText = "GPS非対応";
                return;
            }

            navigator.geolocation.watchPosition(
                (position) => {
                    const uLat = position.coords.latitude;
                    const uLng = position.coords.longitude;
                    let matchedArea = null;

                    for (const area of AREAS) {
                        const dist = getDistanceKm(uLat, uLng, area.lat, area.lng);
                        if (dist <= area.radiusKm) {
                            matchedArea = area;
                            break;
                        }
                    }

                    if (matchedArea) {
                        statusEl.innerText = `📍 到着自動連動: ${matchedArea.name.substring(0,10)}...`;
                        statusEl.className = "status-badge gps-active";
                        if (currentActiveId !== matchedArea.id) {
                            selectTab(matchedArea.id);
                        }
                    } else {
                        statusEl.innerText = "📡 飛行中 / エリア外（手動切替）";
                        statusEl.className = "status-badge";
                    }
                },
                (err) => {
                    statusEl.innerText = "🔒 GPS信号オフ";
                    statusEl.className = "status-badge";
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
            );
        }

        function manualRetry() { startGpsTracking(); }
        
        // 画面リサイズ（回転）の検知
        window.addEventListener('resize', () => renderSidebar(currentActiveId));

        // 初回起動
        selectTab(currentActiveId);
        startGpsTracking();
    </script>
</body>
</html>
