<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station PIN Codes</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* サイドバー設定 */
        .sidebar {
            width: 260px;
            background: #f9f9fb;
            border-right: 1px solid #e5e5ea;
            display: flex;
            flex-direction: column;
            height: 100%;
            flex-shrink: 0;
            transition: width 0.3s ease;
        }
        .sidebar-header {
            padding: 12px 15px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #8e8e93;
            border-bottom: 1px solid #e5e5ea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            white-space: nowrap;
        }
        .tab-list { overflow-y: auto; flex: 1; }
        .tab-item {
            padding: 14px 15px;
            cursor: pointer;
            border-bottom: 1px solid #f1f1f4;
            font-size: 0.95rem;
            color: #3a3a3c;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .tab-item.active { background-color: #e5e5ea; font-weight: bold; color: #1d1d1f; }
        .tab-meta { font-size: 0.7rem; color: #8e8e93; }

        @media screen and (max-width: 768px) {
            .sidebar { width: 65px; }
            .sidebar-header span, .tab-meta { display: none; }
            .sidebar-header { padding: 10px 5px; justify-content: center; }
            .sidebar-header button { font-size: 0.6rem; padding: 2px 4px; }
            .tab-item { padding: 15px 5px; align-items: center; text-align: center; }
            .tab-title-text { font-size: 0.85rem; display: block; width: 100%; overflow: hidden; white-space: nowrap; }
        }

        /* メインエリア & エディタ */
        .main-content {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        .top-bar {
            padding: 8px 15px;
            border-bottom: 1px solid #e5e5ea;
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
        }
        .status-badge { padding: 4px 8px; border-radius: 12px; background: #e5e5ea; color: #48484a; font-weight: 500; }
        .status-badge.gps-active { background: #d1e7dd; color: #0f5132; }

        .editor-container { flex: 1; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        .editable-body { outline: none; min-height: 80%; line-height: 1.6; white-space: pre-wrap; font-size: 1rem; color: #1d1d1f; }
        
        /* Bear風デコレーション */
        .m-blue   { background-color: #d1e7dd; color: #0f5132; padding: 1px 4px; border-radius: 4px; font-weight: bold; }
        .m-yellow { background-color: #fff3cd; color: #664d03; padding: 1px 4px; border-radius: 4px; font-weight: bold; }
        .m-pink   { background-color: #f8d7da; color: #842029; padding: 1px 4px; border-radius: 4px; font-weight: bold; }
        .m-gray   { background-color: #e2e3e5; color: #41464b; padding: 1px 4px; border-radius: 4px; }
        .f-large  { font-size: 1.25rem; }
        .f-bold   { font-weight: bold; }
        .map-img  { max-width: 100%; height: auto; margin-top: 15px; border-radius: 6px; }

        .toast { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.8); color: white; padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; display: none; z-index: 1000; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <span>STATION</span>
            <button onclick="manualRetry()">GPS再捕</button>
        </div>
        <div id="tab-list" class="tab-list"></div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div id="gps-status" class="status-badge">GPS接続中...</div>
            <span style="color:#8e8e93; font-size:0.7rem;">直接編集可能（自動保存）</span>
        </div>
        
        <div class="editor-container">
            <div id="editor-body" class="editable-body" contenteditable="true" oninput="saveContentChange()"></div>
        </div>
    </div>

    <div id="toast" class="toast">保存しました</div>

    <script>
        const STATION_COORDINATES = {
            itm: { lat: 34.789539, lng: 135.438519, rad: 4.0, short: "🇯🇵O3", keywords: ["O3", "伊丹", "ITM"] },
            cts: { lat: 42.775244, lng: 141.692291, rad: 5.0, short: "🇯🇵C3", keywords: ["C3", "千歳", "CTS"] },
            fuk: { lat: 33.585806, lng: 130.450654, rad: 4.0, short: "🇯🇵F2", keywords: ["F2", "福岡", "FUK"] },
            kix: { lat: 34.436521, lng: 135.244141, rad: 5.0, short: "🇯🇵B2", keywords: ["B2", "関空", "KIX"] },
            hnd: { lat: 35.549225, lng: 139.784432, rad: 5.0, short: "🇯🇵G3", keywords: ["G3", "羽田", "HND"] },
            oka: { lat: 26.206411, lng: 127.646533, rad: 4.0, short: "🇯🇵縄3", keywords: ["縄3", "那覇", "OKA"] },
            ngo: { lat: 34.858411, lng: 136.805391, rad: 4.0, short: "☀️T3", keywords: ["T3", "中部", "NGO"] },
            aoj: { lat: 40.734567, lng: 140.690856, rad: 3.0, short: "☀️A3", keywords: ["A3", "青森", "AOJ"] },
            can_memo: { lat: 23.392436, lng: 113.298786, rad: 10.0, short: "CAN", keywords: ["CAN", "広州"] },
            tpe: { lat: 25.079706, lng: 121.234217, rad: 10.0, short: "✈️海外", keywords: ["海外", "TPE"] },
            zushi: { lat: 34.960631, lng: 139.578641, rad: 3.0, short: "🏠現地", keywords: ["逗子", "現地"] }
        };

        let CURRENT_DATABASE = JSON.parse(localStorage.getItem('airport_pin_db_v3')) || INITIAL_DATA;
        let currentActiveId = CURRENT_DATABASE[0].id;
        let saveTimeout = null;

        // URLから送られてきたBearデータを自動で解析・上書き保存する関数
        function checkUrlImport() {
            const urlParams = new URLSearchParams(window.location.search);
            const rawText = urlParams.get('importData');
            
            if (rawText) {
                // シャープ記号を基準に各ノートへ分解
                const chunks = rawText.split(/(?=\n#\s|\n##\s|^#\s|^##\s)/g);
                let importCount = 0;

                chunks.forEach(chunk => {
                    const trimmed = chunk.trim();
                    if(!trimmed) return;

                    const lines = trimmed.split("\n");
                    let title = lines[0].replace(/^#+\s*/, "").trim();
                    if(!title) return;

                    let matchedId = null;
                    for (const [id, target] of Object.entries(STATION_COORDINATES)) {
                        if (target.keywords.some(k => title.includes(k))) {
                            matchedId = id;
                            break;
                        }
                    }

                    if (matchedId) {
                        const record = CURRENT_DATABASE.find(r => r.id === matchedId);
                        if (record) {
                            record.name = title;
                            record.content = lines.map((line, i) => i === 0 ? `<b>${line.replace(/^#+\s*/, "")}</b>` : line).join("\n");
                            importCount++;
                        }
                    }
                });

                if (importCount > 0) {
                    localStorage.setItem('airport_pin_db_v3', JSON.stringify(CURRENT_DATABASE));
                    // URLパラメータを綺麗に消去してリダイレクト（リロード無限ループ防止）
                    window.history.replaceState({}, document.title, window.location.pathname);
                    showToast(`🔄 Bearから ${importCount} 件のデータを自動同期しました！`);
                }
            }
        }

        function renderSidebar(activeId) {
            const listEl = document.getElementById("tab-list");
            listEl.innerHTML = "";
            CURRENT_DATABASE.forEach(data => {
                const item = document.createElement("div");
                item.className = `tab-item ${data.id === activeId ? 'active' : ''}`;
                item.onclick = () => selectTab(data.id);
                
                const coord = STATION_COORDINATES[data.id];
                const shortName = coord ? coord.short : data.name.substring(0, 4);
                
                item.innerHTML = `
                    <span class="tab-title-text" title="${data.name}">${data.name}</span>
                    <span class="tab-meta">半径 ${coord ? coord.rad : 3}km</span>
                `;
                if (window.innerWidth <= 768) {
                    item.querySelector('.tab-title-text').innerText = shortName;
                }
                listEl.appendChild(item);
            });
        }

        function renderEditor(id) {
            const record = CURRENT_DATABASE.find(r => r.id === id);
            if (!record) return;
            currentActiveId = id;
            document.getElementById("editor-body").innerHTML = record.content;
        }

        function selectTab(id) {
            currentActiveId = id;
            renderSidebar(id);
            renderEditor(id);
        }

        function saveContentChange() {
            const record = CURRENT_DATABASE.find(r => r.id === currentActiveId);
            if (record) {
                const fullHtml = document.getElementById("editor-body").innerHTML;
                record.content = fullHtml;
                
                const tempDiv = document.createElement("div");
                tempDiv.innerHTML = fullHtml;
                record.name = tempDiv.innerText.split("\n")[0] || record.name;

                renderSidebar(currentActiveId);
                
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => {
                    localStorage.setItem('airport_pin_db_v3', JSON.stringify(CURRENT_DATABASE));
                    showToast("保存しました");
                }, 1000);
            }
        }

        function showToast(msg) {
            const toast = document.getElementById("toast");
            toast.innerText = msg;
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 2000);
        }

        function getDistanceKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function startGpsTracking() {
            const statusEl = document.getElementById("gps-status");
            if (!("geolocation" in navigator)) return;

            navigator.geolocation.watchPosition(
                (position) => {
                    const uLat = position.coords.latitude;
                    const uLng = position.coords.longitude;
                    let matchedId = null;

                    for (const [id, target] of Object.entries(STATION_COORDINATES)) {
                        if (getDistanceKm(uLat, uLng, target.lat, target.lng) <= target.rad) {
                            matchedId = id;
                            break;
                        }
                    }

                    if (matchedId) {
                        const targetRecord = CURRENT_DATABASE.find(r => r.id === matchedId);
                        statusEl.innerText = `📍 到着自動連動: ${targetRecord ? targetRecord.name.substring(0,8) : matchedId}`;
                        statusEl.className = "status-badge gps-active";
                        if (currentActiveId !== matchedId) selectTab(matchedId);
                    } else {
                        statusEl.innerText = "📡 エリア外（手動切替モード）";
                        statusEl.className = "status-badge";
                    }
                },
                (err) => { statusEl.innerText = "🔒 GPS信号オフ（手動選択）"; statusEl.className = "status-badge"; },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
            );
        }

        function manualRetry() { startGpsTracking(); }
        window.addEventListener('resize', () => renderSidebar(currentActiveId));

        // 初期キック時にインポートチェックを実行
        checkUrlImport();
        selectTab(currentActiveId);
        startGpsTracking();
    </script>

            { id: "cts", name: "🇯🇵C3 KKW:BD◯◯(前月)", content: `<b>🇯🇵C3 KKW:BD◯◯(前月)</b>\n\nID使えるらしい◆\n\nエレベータ、保安検査場：<span class="m-gray f-bold">3017#</span>\n2511、？\n\n<span class="m-pink">G : 2514</span> , <span class="m-pink">PBB: 2513</span>\n\n#14下クルーバス乗り場：<span class="m-gray f-bold">25(1)2</span>\nホテルバス @警察署先\n\n2026/5/1リバイス.` },
            { id: "fuk", name: "🇯🇵F2 ロビー→1250E 3階", content: `<b>🇯🇵F2 ロビー→1250E 3階</b>\n\n<span class="m-pink">G: 3042E</span> 左回転\n\n<span class="m-pink">PBB先端：5209E</span> 左回転\n\nOPEN/ ARR時：<span class="m-gray f-bold">3042 E→3042 E</span>\n福岡昭和タクシー：0120-408-860\nターミナル出て左に変わった\n\nロビーから：「バックヤード」<span class="m-gray f-bold">3994 E</span>\n\n2026/5/1リバイス` },
            { id: "kix", name: "🇯🇵B2 エア棟: 1125E 5階", content: `<b>🇯🇵B2 エア棟: 1125E 5階</b>\n\nエア棟<span class="m-yellow">5階</span>＝タ<span class="m-yellow">3階</span> <span class="m-yellow">4階</span>へ\nタ<span class="m-yellow">4階</span>→<span class="m-yellow">北側(遠い方)保安検査</span>→3階出国\n\n<span class="m-blue">INT</span> 検査後：<span class="m-blue">5031▽</span> (23-7時)\n\n<span class="m-blue">G : 07GG#</span> ,\n\nPBB：0933# 螺旋：0940\n\n<span class="m-pink">DOM</span> 2F検査後：<span class="m-pink">5071▽</span>\n\n<span class="m-pink">G : 09GGE</span> ,\n\nPBB：0933# 螺旋：0940\n\n2026/5/1　変更無し` },
            { id: "hnd", name: "🇯🇵G3 ビル: 44119# 3階", content: `<b>🇯🇵G3 ビル: 44119# 3階</b>\n\nDispatch後\n\t:ビル<span class="m-blue">4階</span> ＋ ターミナル<span class="m-blue">3階</span>\n\nDOM <span class="m-pink">G : 31383#</span> ,\n\nINT <span class="m-blue">G : 81611#</span> ,\n\tPBB : 35#9\n\n2026/5/1リバイス\n\n<img src="https://i.imgur.com/2Pof6i0.png" class="map-img" alt="HND-INT-MAP">` },
            { id: "oka", name: "🇯🇵縄3 ビル : *5071#", content: `<b>🇯🇵縄3 ビル : *5071#</b>\n\n<span class="m-blue">KKW 4階</span> <span class="m-blue">6717E</span>\n\n<span class="m-pink">G : *6374#</span> (-5/31)\n\n<span class="m-pink">PBB : ■2018▼</span>(-5/31)\n\n2026/5/1リバイス` },
            { id: "ngo", name: "☀️T3 F129 (-8/31)", content: `<b>☀️T3 F129 (-8/31)</b>\n\nDOM <span class="m-pink">G : 7266</span>, (-10/31)\n\tPBB : <span class="m-pink">C0225</span> (~10/31)\n\nINT <span class="m-blue">G : 0397</span> \t(-8/1)\n\tPBB : <span class="m-blue">3804</span> (-4/30) ***\n\n出勤動線A：5480 (-11/1,2頃頃)\n\t保安検査追記：9909\n\n2026/5/1リバイス\n\n北側 F130` },
            { id: "aoj", name: "☀️A3", content: `<b>☀️A3</b>\n\nBAG : P29+M9カウンターに変更\n\n<span class="m-pink">G : 0874</span>, PBB:<span class="m-pink">0133</span>\n\n2026/08/20` },
            { id: "can_memo", name: "CAN", content: `<b>CAN</b>\n\n到着：\n\n出発：\n@ホテル\nDispatch Brief：ホテル2階 (W213)\nPBBの暗証番号を聞く\n終了後ホテル1階ロビー → バスで空港3階 46ゲートから入れる\n\n@空港\n手荷物：Mカウンター\n手荷物検査：STAFF LANE →「乗務員搭乗LIST」、パスポート、ID\n税関：「税関申告書」を提出\n出国：CREW LANE ＋「乗務員搭乗LIST」,「GD」提出\n\n2025/03/19` },
            { id: "zushi", name: "🏠現地テスト用（逗子周辺）", content: `<b>🏠現地テスト用（逗子周辺）</b>\n\n【これは自宅・滞在先テスト用のダミータブです】\n\n伊丹空港と全く同じ連動テストがここで行えます。\n\n①KKWビル入口自動ドア：<span class="m-blue f-large">2485E</span>\n②北従業員 検査場 通路：<span class="m-pink f-large">7244</span>\n\n文字を自由に打ち換えてテストしてください。` }
        ];
    </script>
</body>
</html>
